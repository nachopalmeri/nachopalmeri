name: Update README cards

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-cards:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate GitHub stats cards
        run: |
          mkdir -p profile
          curl -L "https://github-readme-stats.vercel.app/api?username=nachopalmeri&show_icons=true&theme=transparent&hide_border=true&rank_icon=github&include_all_commits=true" -o profile/stats.svg
          curl -L "https://github-readme-stats.vercel.app/api/top-langs/?username=nachopalmeri&layout=compact&theme=transparent&hide_border=true&langs_count=8&size_weight=0.5&count_weight=0.5" -o profile/top-langs.svg

      - name: Commit updated cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push
